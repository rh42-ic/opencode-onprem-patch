name: Build Onprem Release

on:
  push:
    tags:
      - 'v*-onprem' # Matches tags like v1.14.40-onprem
  workflow_dispatch:
    inputs:
      upstream_version:
        description: "Upstream version to build (e.g. 1.14.40)"
        required: true
        type: string

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows creating Release and uploading assets
    
    steps:
      - name: Checkout onprem-patch repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Parse Versions and Create Release Note
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            UPSTREAM_VER="${{ github.event.inputs.upstream_version }}"
            TAG_NAME="v${UPSTREAM_VER}-onprem"
          else
            TAG_NAME=${GITHUB_REF_NAME} # e.g. v1.14.40-onprem
            RAW_TAG=${TAG_NAME#v} # e.g. 1.14.40-onprem
            UPSTREAM_VER=${RAW_TAG%-onprem} # e.g. 1.14.40
          fi
          
          OPENCODE_VERSION="${UPSTREAM_VER}-onprem"
          
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV
          echo "UPSTREAM_VER=$UPSTREAM_VER" >> $GITHUB_ENV
          echo "OPENCODE_VERSION=$OPENCODE_VERSION" >> $GITHUB_ENV
          
          # Generate Release Notes
          cat <<EOF > release_body.md
          同步更新到 v${UPSTREAM_VER} 版本，详细更新参阅 [OpenCode v${UPSTREAM_VER} Release](https://github.com/anomalyco/opencode/releases/tag/v${UPSTREAM_VER})。
          
          Synchronized update to version v${UPSTREAM_VER}, for detailed updates see [OpenCode v${UPSTREAM_VER} Release](https://github.com/anomalyco/opencode/releases/tag/v${UPSTREAM_VER}).
          EOF
          
          echo "Building onprem version $TAG_NAME based on upstream v$UPSTREAM_VER"

      - name: 1. Download Upstream & Setup Git
        run: |
          mkdir upstream
          # Download corresponding upstream vX.XX.XX source
          curl -L "https://github.com/anomalyco/opencode/archive/refs/tags/v${UPSTREAM_VER}.tar.gz" | tar -xz -C upstream --strip-components=1
          
          # Initialize temporary Git management
          cd upstream
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: init upstream v${UPSTREAM_VER}"

      - name: 2. Apply Patches using Script
        run: |
          # Use the specialized application script
          bash scripts/apply-patches.sh upstream
          
          cd upstream
          git add .
          git commit -m "chore: apply onprem patches and modules"

      - name: 3. Install Dependencies
        run: |
          cd upstream
          bun install

      - name: 4. Pre-download Dependencies (All Platforms)
        run: |
          cd upstream
          # Execute full platform pre-download
          bun run script/download-onprem-deps.ts --platforms=linux-x64-musl,linux-x64-gnu,linux-arm64-musl,linux-arm64-gnu,windows-x64,darwin-x64,darwin-arm64

      - name: 5. Package Bundle (All Platforms)
        run: |
          cd upstream
          # Package all platforms
          # OPENCODE_VERSION is set in environment (e.g. 1.14.40-onprem)
          bun run script/package-onprem-bundle.ts --platforms=linux-x64-musl,linux-x64-gnu,linux-arm64-musl,linux-arm64-gnu,windows-x64,darwin-x64,darwin-arm64

      - name: 6. Publish to GitHub Releases
        if: github.event_name != 'workflow_dispatch' || inputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: "OpenCode Onprem ${{ env.TAG_NAME }}"
          tag_name: ${{ env.TAG_NAME }}
          body_path: release_body.md
          draft: false
          prerelease: false
          files: |
            upstream/dist/opencode-onprem-*.tar.zst
            upstream/dist/opencode-onprem-*.7z
